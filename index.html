<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Egyptian Museum - Famous Artefacts</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url(Pages/Photos/HomeBackground.jpg);
            background-size: cover;
            background-attachment: fixed;
            margin: 0;
            padding: 0;
        }
        
        header {
            background-color: #c49a6c;
            color: white;
            text-align: center;
            padding: 25px;
            font-size: 32px;
            letter-spacing: 1px;
        }
        
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, auto));
            gap: 25px;
            padding: 30px;
        }
        
        .card {
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s ease;
            opacity: 0.8;
        }
        
        .card:hover {
            transform: scale(1.05);
            opacity: 1;
        }
        
        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        footer {
            text-align: center;
            padding: 20px;
            background-color: #c49a6c;
            color: white;
            font-size: 14.4px;
        }
    </style>
</head>

<body>

    <header>
        Top Famous Artefacts - Grand Egyptian Museum
    </header>

    <section class="gallery">

        <div class="card" onclick="openPage('Pages/Statue of Ramses II.html')">
            <img src="Pages/Photos/Statue of Ramses II.jpg" alt="Statue of Ramses II" title="Statue of Ramses II">
            <h3>Statue of Ramses II</h3>
        </div>

        <div class="card" onclick="openPage('Pages/Statue of Khafre.html')">
            <img src="Pages/Photos/Statue of Khafre.jpg" alt="Statue of Khafre" title="Statue  of Khafre">
        </div>

        <div class="card" onclick="openPage('Pages/Golden Mask of Tutankhamun.html')">
            <img src="Pages/Photos/Golden Mask of Tutankhamun.jpg" alt="Golden Mask of Tutankhamun" title="Golden Mask of Tutankhamun">
        </div>

        <div class="card" onclick="openPage('Pages/Statue of Amenhotep III and Tiye.html')">
            <img src="Pages/Photos/Statue of Amenhotep III and Tiye.jpg" alt="Statue of Amenhotep III and Tiye" title="Statue of Amenhotep III and Tiye">
        </div>

        <div class="card" onclick="openPage('Pages/Statue of Akhenaten.html')">
            <img src="Pages/Photos/Statue of Akhenaten.jpg" alt="Statue of Akhenaten" title="Statue of Akhenaten">
        </div>

    </section>

    <footer>
        © 2025 Grand Egyptian Museum | Designed by Quantaemaa [ Mahmoud Hassan - Amr Hossam - Ezzeldin Marouf ]
    </footer>

    <script>
        function openPage(page) {
            window.open(page, '_blank');
        }
    </script>
</body>

</html>
